<div class="modal-backdrop" onclick="if(event.target===this) cerrarModal()">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>Resetear clave de {{ usuario.usuario }}</h3>
      <button type="button" class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <form hx-put="/config/usuarios/{{ usuario.id_usuario }}/clave"
          hx-target="#modal-root"
          hx-swap="outerHTML">
      <label>Nueva clave:
        <input type="password" name="nueva_clave" required minlength="4" maxlength="100">
      </label>
      <label>Confirmar clave:
        <input type="password" name="confirmar_clave" required minlength="4" maxlength="100">
      </label>
      <div class="modal-footer">
        <button type="submit" class="btn-primary">Actualizar</button>
        <button type="button" class="btn-sec" onclick="cerrarModal()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
