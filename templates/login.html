{% extends "base.html" %}
{% block title %}Ingresar — SIGCO Systems{% endblock %}

{% block content %}
<div class="login-wrap">

    <div class="login-bg">
        <div class="bg-grid"></div>
        <div class="bg-orb orb1"></div>
    </div>

    <div class="login-box">
        <a href="/" class="login-back">← Inicio</a>

        <img src="/static/img/logo.png" alt="SIGCO Systems" class="login-logo">

        <h2 class="login-title">Acceso al sistema</h2>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
            <div class="field">
                <label for="usuario">Usuario o correo</label>
                <input type="text" id="usuario" name="usuario"
                       placeholder="usuario / DNI / correo"
                       autocomplete="username" required>
            </div>

            <div class="field">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave"
                       placeholder="••••••••"
                       autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <p class="login-help">
            ¿Problemas para ingresar?
            <a href="https://wa.me/51944831711" target="_blank">Contactar soporte</a>
        </p>
    </div>
</div>
{% endblock %}
