<tr id="row-grupo-{{ g.id_grupo }}">
  <td>{{ g.id_grupo }}</td>
  <td>{{ g.nombre_grupo }}</td>
  <td class="col-acciones">
    {% if permisos | puede("TABLAS", "Grupos", "btn_editar") %}
      <button class="btn-sec"
              hx-get="/tablas/grupos/{{ g.id_grupo }}/editar"
              hx-target="#modal-root"
              hx-swap="innerHTML">Editar</button>
    {% endif %}
    {% if permisos | puede("TABLAS", "Grupos", "btn_eliminar") %}
      <button class="btn-danger"
              hx-delete="/tablas/grupos/{{ g.id_grupo }}"
              hx-target="#row-grupo-{{ g.id_grupo }}"
              hx-swap="outerHTML"
              data-confirmar="¿Eliminar este grupo?"
              data-confirmar-titulo="Eliminar grupo"
              data-confirmar-aceptar="Eliminar">Eliminar</button>
    {% endif %}
  </td>
</tr>
